<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Snake – danmaxbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; color: #e2e8f0; font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    #score { margin-bottom: 0.5rem; font-size: 1.2rem; }
    canvas { background: #1e293b; border: 2px solid #38bdf8; touch-action: none; }
    #controls { margin-top: 1rem; display: flex; gap: 1rem; }
    button { background: #38bdf8; color: #0f172a; border: none; padding: 0.75rem 1.5rem; border-radius: 0.25rem; font-weight: bold; cursor: pointer; }
    button:active { background: #0ea5e9; }
  </style>
</head>
<body>
  <h1>🐍 Snake</h1>
  <div id="score">Puntos: <span id="pts">0</span></div>
  <canvas id="game" width="300" height="300"></canvas>
  <div id="controls">
    <button id="restart">Reiniciar</button>
  </div>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const ptsSpan = document.getElementById('pts');
    const restartBtn = document.getElementById('restart');

    const grid = 15;
    const cols = Math.floor(canvas.width / grid);
    const rows = Math.floor(canvas.height / grid);

    let snake = [{x: 5, y: 5}];
    let dir = {x: 1, y: 0};
    let food = {x: 10, y: 10};
    let score = 0;
    let gameOver = false;

    function drawRect(x, y, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x * grid, y * grid, grid - 1, grid - 1);
    }

    function move() {
      if (gameOver) return;
      const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

      // wrap around
      if (head.x < 0) head.x = cols - 1;
      if (head.x >= cols) head.x = 0;
      if (head.y < 0) head.y = rows - 1;
      if (head.y >= rows) head.y = 0;

      // collision with self
      for (let segment of snake) {
        if (head.x === segment.x && head.y === segment.y) {
          gameOver = true;
          return;
        }
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        ptsSpan.textContent = score;
        placeFood();
      } else {
        snake.pop();
      }
    }

    function placeFood() {
      food = {
        x: Math.floor(Math.random() * cols),
        y: Math.floor(Math.random() * rows)
      };
      // avoid placing on snake
      for (let s of snake) {
        if (food.x === s.x && food.y === s.y) return placeFood();
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawRect(food.x, food.y, '#ef4444'); // red
      for (let i = 0; i < snake.length; i++) {
        drawRect(snake[i].x, snake[i].y, i === 0 ? '#38bdf8' : '#0ea5e9'); // head lighter
      }
    }

    function loop() {
      move();
      draw();
      if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#fff';
        ctx.font = '16px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Game Over', canvas.width/2, canvas.height/2);
        ctx.fillText('Puntuación: '+score, canvas.width/2, canvas.height/2+20);
      } else {
        setTimeout(loop, 100); // speed
      }
    }

    // controls: keyboard
    document.addEventListener('keydown', e => {
      if (gameOver) return;
      switch(e.key) {
        case 'ArrowUp': if (dir.y === 0) dir = {x:0,y:-1}; break;
        case 'ArrowDown': if (dir.y === 0) dir = {x:0,y:1}; break;
        case 'ArrowLeft': if (dir.x === 0) dir = {x:-1,y:0}; break;
        case 'ArrowRight': if (dir.x === 0) dir = {x:1,y:0}; break;
      }
    });

    // controls: touch swipe
    let touchStartX = 0, touchStartY = 0;
    canvas.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      e.preventDefault();
    });
    canvas.addEventListener('touchmove', e => e.preventDefault());
    canvas.addEventListener('touchend', e => {
      if (gameOver) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 0 && dir.x === 0) dir = {x:1,y:0};
        else if (dx < 0 && dir.x === 0) dir = {x:-1,y:0};
      } else {
        if (dy > 0 && dir.y === 0) dir = {x:0,y:1};
        else if (dy < 0 && dir.y === 0) dir = {x:0,y:-1};
      }
      e.preventDefault();
    });

    restartBtn.addEventListener('click', () => {
      snake = [{x: 5, y: 5}];
      dir = {x: 1, y: 0};
      score = 0;
      ptsSpan.textContent = score;
      gameOver = false;
      placeFood();
      loop();
    });

    placeFood();
    loop();
  </script>
</body>
</html>
