<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Viaje en el Tiempo de los Lara</title>
  <style>
    :root { --bg: #0f172a; --fg: #e2e8f0; --accent: #38bdf8; --muted: #94a3b8; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); line-height: 1.7; }
    .container { max-width: 800px; margin: 0 auto; padding: 1.5rem; }
    header { text-align: center; margin-bottom: 2rem; }
    h1 { color: var(--accent); margin: 0 0 0.5rem; font-size: 1.75rem; }
    h2 { color: var(--accent); margin-top: 2rem; font-size: 1.4rem; }
    h3 { color: var(--accent); margin-top: 1.5rem; font-size: 1.2rem; }
    p, li { margin-bottom: 0.75rem; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    /* TTS controls */
    .controls { position: fixed; bottom: 1rem; right: 1rem; display: flex; gap: 0.5rem; z-index: 100; }
    button { background: var(--accent); color: var(--bg); border: none; padding: 0.75rem 1rem; border-radius: 0.25rem; font-weight: bold; cursor: pointer; touch-action: manipulation; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    #progress { position: fixed; top: 0; left: 0; height: 4px; background: var(--accent); width: 0%; z-index: 99; }
    /* Responsive adjustments */
    @media (max-width: 600px) {
      .container { padding: 1rem; }
      h1 { font-size: 1.5rem; }
      h2 { font-size: 1.25rem; }
      h3 { font-size: 1.1rem; }
      button { padding: 0.6rem 0.9rem; font-size: 0.9rem; }
      .controls { bottom: 0.5rem; right: 0.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📖 El Viaje en el Tiempo de los Lara</h1>
      <p>Libro completo – Expansión v1 (2026)</p>
      <p><em>Una historia de ciencia ficción chilena con base científica.</em></p>
    </header>

    <section id="content">
      Cargando libro...
    </section>
  </div>

  <div class="controls">
    <button id="play">▶️ Leer</button>
    <button id="pause">⏸️ Pausa</button>
    <button id="stop">⏹️ Stop</button>
  </div>
  <div id="progress"></div>

  <!-- marked.js desde CDN -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script>
    const synth = window.speechSynthesis;
    let paragraphs = [];
    let currentIdx = 0;
    let isPaused = false;

    fetch('content.md')
      .then(r => r.text())
      .then(md => {
        const html = marked.parse(md);
        document.getElementById('content').innerHTML = html;
        const text = document.getElementById('content').innerText;
        paragraphs = text.split(/\n\s*\n/).filter(p => p.trim().length > 0);
        console.log('Párrafos cargados:', paragraphs.length);
      })
      .catch(err => {
        document.getElementById('content').innerHTML = '<p>Error cargando el libro.</p>';
        console.error(err);
      });

    function speakParagraph() {
      if (currentIdx >= paragraphs.length) {
        updateProgress(100);
        return;
      }
      const txt = paragraphs[currentIdx].trim();
      if (!txt) {
        currentIdx++;
        return speakParagraph();
      }
      const utter = new SpeechSynthesisUtterance(txt);
      utter.lang = 'es-CL';
      utter.rate = 1.0;
      utter.onend = () => {
        currentIdx++;
        const percent = (currentIdx / paragraphs.length) * 100;
        updateProgress(percent);
        speakParagraph();
      };
      utter.onerror = e => { console.error('TTS error:', e); };
      synth.speak(utter);
    }

    document.getElementById('play').addEventListener('click', () => {
      if (synth.speaking && isPaused) { synth.resume(); isPaused = false; return; }
      if (synth.speaking) return;
      if (paragraphs.length === 0) { alert('El libro no está cargado aún.'); return; }
      speakParagraph();
    });

    document.getElementById('pause').addEventListener('click', () => {
      if (synth.speaking && !isPaused) { synth.pause(); isPaused = true; }
    });

    document.getElementById('stop').addEventListener('click', () => {
      synth.cancel();
      isPaused = false;
      currentIdx = 0;
      updateProgress(0);
    });

    function updateProgress(percent) { document.getElementById('progress').style.width = percent + '%'; }
  </script>
</body>
</html>
