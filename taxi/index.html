<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Radio Taxi Full Express</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; color: #e2e8f0; font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    #score { margin-bottom: 0.5rem; font-size: 1.2rem; }
    canvas { background: #1e293b; border: 2px solid #f59e0b; touch-action: none; }
    #controls { margin-top: 1rem; display: flex; gap: 1rem; }
    button { background: #f59e0b; color: #0f172a; border: none; padding: 0.75rem 1.5rem; border-radius: 0.25rem; font-weight: bold; cursor: pointer; }
    button:active { background: #d97706; }
    #instructions { font-size: 0.9rem; color: #94a3b8; margin-top: 0.5rem; text-align: center; }
  </style>
</head>
<body>
  <h1>🚕 Radio Taxi Full Express</h1>
  <div id="score">Puntos: <span id="pts">0</span></div>
  <canvas id="game" width="500" height="300"></canvas>
  <div id="instructions">Usa ↑/↓ o desliza verticalmente para cambiar de pista</div>
  <div id="controls">
    <button id="restart">Reiniciar</button>
  </div>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const ptsSpan = document.getElementById('pts');
    const restartBtn = document.getElementById('restart');

    // Web Audio API context for sounds
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    function playBeep() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    }

    function playCrash() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const bufferSize = audioCtx.sampleRate * 0.3;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
      const source = audioCtx.createBufferSource();
      const gain = audioCtx.createGain();
      source.buffer = buffer;
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      source.connect(gain);
      gain.connect(audioCtx.destination);
      source.start();
    }

    // Game constants
    const laneCount = 5;
    const laneHeight = canvas.height / laneCount;
    const player = {
      lane: 2,            // 0-4 (center initially)
      x: canvas.width - 60, // fixed x near right edge
      y: 0,               // will be computed from lane
      w: 40,
      h: 50
    };
    player.y = laneToY(player.lane);

    let obstacles = [];
    let score = 0;
    let gameOver = false;
    let speed = 2.5; // pixels per frame
    let spawnTimer = 0;
    const spawnInterval = 60; // frames

    // Emojis para obstáculos
    const obstacleEmojis = ['🚗', '🚓', '🚲', '🛴', '🛵', '🏍️', '🚌', '🚎', '🏎️', '🚑', '🚒', '🚐', '🚚', '🚛', '🚜', '🛢️', '🚧', '🚦', '🗼', '🌵', '🌲', '🌳', '🌴', '☘️', '🍀', '🌾', '🌺', '🌸', '🌼', '🌻', '🍁', '🍂', '🍃', '🐕', '🐈', '🐅', '🦊', '🦝', '🐇', '🦘', '🐁', '🐀', '🐿️', '🦔', '🦇', '🦉', '🦅', '🦆', '🦢', '🦩', '🕊️', '🦜', '🦚', '🦃'];

    function laneToY(lane) {
      return lane * laneHeight + (laneHeight - player.h) / 2;
    }

    function drawLanes() {
      ctx.strokeStyle = '#334155';
      ctx.lineWidth = 1;
      for (let i = 1; i < laneCount; i++) {
        ctx.beginPath();
        ctx.moveTo(0, i * laneHeight);
        ctx.lineTo(canvas.width, i * laneHeight);
        ctx.stroke();
      }
    }

    function drawPlayer() {
      ctx.font = '40px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🚕', player.x + player.w/2, player.y + player.h/2);
    }

    function createObstacle() {
      const lane = Math.floor(Math.random() * laneCount);
      const emoji = obstacleEmojis[Math.floor(Math.random() * obstacleEmojis.length)];
      const size = 30;
      obstacles.push({
        x: -size,
        y: laneToY(lane) + (laneHeight - size) / 2,
        w: size,
        h: size,
        emoji: emoji
      });
    }

    function update() {
      if (gameOver) return;

      // Move obstacles
      for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].x += speed;
        if (obstacles[i].x > canvas.width) {
          obstacles.splice(i, 1);
          score += 1;
          ptsSpan.textContent = score;
          playBeep();
        }
      }

      // Spawn
      spawnTimer++;
      if (spawnTimer >= spawnInterval) {
        createObstacle();
        spawnTimer = 0;
        if (score % 10 === 0 && speed < 8) speed += 0.2;
      }

      // Collision check
      for (let obs of obstacles) {
        if (
          player.x < obs.x + obs.w &&
          player.x + player.w > obs.x &&
          player.y < obs.y + obs.h &&
          player.y + player.h > obs.y
        ) {
          playCrash();
          gameOver = true;
          break;
        }
      }
    }

    function drawObstacles() {
      ctx.font = '30px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for (let obs of obstacles) {
        ctx.fillText(obs.emoji, obs.x + obs.w/2, obs.y + obs.h/2);
      }
    }

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawLanes();
      if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#fff';
        ctx.font = '16px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Game Over', canvas.width/2, canvas.height/2);
        ctx.fillText('Puntuación: '+score, canvas.width/2, canvas.height/2+20);
      } else {
        update();
        drawObstacles();
        drawPlayer();
        requestAnimationFrame(loop);
      }
    }

    // Keyboard: up/down arrows
    document.addEventListener('keydown', e => {
      if (gameOver) return;
      if (e.key === 'ArrowUp' || e.key === 'w') {
        if (player.lane > 0) player.lane--;
      }
      if (e.key === 'ArrowDown' || e.key === 's') {
        if (player.lane < laneCount - 1) player.lane++;
      }
      player.y = laneToY(player.lane);
    });

    // Touch: vertical swipe
    let touchStartY = 0;
    canvas.addEventListener('touchstart', e => {
      touchStartY = e.touches[0].clientY;
      e.preventDefault();
    });
    canvas.addEventListener('touchmove', e => e.preventDefault());
    canvas.addEventListener('touchend', e => {
      if (gameOver) return;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dy) > 30) {
        if (dy < 0 && player.lane > 0) {
          player.lane--; // swipe up -> move up (lane 0 es el superior)
        } else if (dy > 0 && player.lane < laneCount - 1) {
          player.lane++; // swipe down -> move down
        }
      }
      player.y = laneToY(player.lane);
      e.preventDefault();
    });

    restartBtn.addEventListener('click', () => {
      player.lane = 2;
      player.y = laneToY(player.lane);
      obstacles = [];
      score = 0;
      speed = 2.5;
      spawnTimer = 0;
      gameOver = false;
      ptsSpan.textContent = score;
      loop();
    });

    // init
    player.y = laneToY(player.lane);
    loop();
  </script>
</body>
</html>
